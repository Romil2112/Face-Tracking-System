[tool.ruff]
target-version = "py310"
line-length = 100
extend-exclude = [".venv"]

[tool.ruff.lint]
# PEP 8 (E/W), pyflakes (F), isort (I), pep8-naming (N), pyupgrade (UP), bugbear (B).
select = ["E", "W", "F", "I", "N", "UP", "B"]
ignore = [
    "E501",  # long lines handled case-by-case
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["N802", "N806"]      # test helpers use non-PEP8 names freely
"src/api.py" = ["B008"]           # FastAPI dependency defaults (File(...)) are idiomatic

[tool.coverage.run]
branch = true
source = ["src"]
omit = ["tests/*", "conftest.py", ".venv/*"]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__.:",
]

[tool.mypy]
python_version = "3.10"
# Unstubbed third-party deps (cv2, numpy, imutils, fastapi internals).
ignore_missing_imports = true
warn_unused_ignores = false
exclude = ['\.venv']
